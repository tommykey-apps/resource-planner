<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" role="img" aria-label="Plan">
  <!-- Three rows representing gantt bars - tab icon style -->
  <!-- Row 1 -->
  <rect x="3" y="5" width="10" height="3" rx="1" fill="#0EA5E9"/>
  <line x1="14" y1="6.5" x2="21" y2="6.5" stroke="#111111" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>

  <!-- Row 2 -->
  <line x1="3" y1="12" x2="8" y2="12" stroke="#111111" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>
  <rect x="8" y="10.5" width="10" height="3" rx="1" fill="#F59E0B"/>
  <line x1="18" y1="12" x2="21" y2="12" stroke="#111111" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>

  <!-- Row 3 -->
  <line x1="3" y1="17.5" x2="6" y2="17.5" stroke="#111111" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>
  <rect x="6" y="16" width="12" height="3" rx="1" fill="#10B981"/>
</svg>
