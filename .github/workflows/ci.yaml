name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  id-token: write
  contents: read
  packages: read

env:
  AWS_ROLE_ARN: arn:aws:iam::831963379503:role/resource-planner-github-actions

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@tommykey-apps'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Type check
        run: pnpm check
        working-directory: web

      - name: Build
        run: pnpm build
        working-directory: web

  test:
    runs-on: ubuntu-latest
    services:
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports: ["8000:8000"]
        # NOTE: amazon/dynamodb-local image はシェルなしのため services.options で
        # --health-cmd を渡せない。後続ステップで wait ループする (db-docs.yaml と同じ)。
    env:
      AWS_ENDPOINT_URL: http://localhost:8000
      AWS_REGION: ap-northeast-1
      AWS_DEFAULT_REGION: ap-northeast-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      DYNAMODB_TABLE: resource-planner
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@tommykey-apps'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for DynamoDB Local
        run: |
          for i in {1..30}; do
            curl -s http://localhost:8000 > /dev/null && exit 0
            sleep 1
          done
          echo "DynamoDB Local did not start within 30s"
          exit 1

      # NOTE: 同じ create-table 定義が以下にもある (GSI1 も含めて全箇所同期):
      #   - Makefile の db ターゲット
      #   - .github/workflows/db-docs.yaml の Create table ステップ
      # いずれかを変更したら必ず全箇所を同期すること。
      - name: Create table
        run: |
          aws dynamodb create-table \
            --table-name resource-planner \
            --attribute-definitions \
              AttributeName=pk,AttributeType=S \
              AttributeName=sk,AttributeType=S \
              AttributeName=GSI1PK,AttributeType=S \
              AttributeName=GSI1SK,AttributeType=S \
            --key-schema \
              AttributeName=pk,KeyType=HASH \
              AttributeName=sk,KeyType=RANGE \
            --global-secondary-indexes \
              'IndexName=GSI1,KeySchema=[{AttributeName=GSI1PK,KeyType=HASH},{AttributeName=GSI1SK,KeyType=RANGE}],Projection={ProjectionType=ALL}' \
            --billing-mode PAY_PER_REQUEST \
            --endpoint-url http://localhost:8000

      - name: Run tests
        run: pnpm test
        working-directory: web

  # Playwright E2E。Phase 3 (Auth.js + Magic Link) 完了まで disable する。
  # 有効化条件: web/e2e/ に sign-in fixture + 実 spec が揃った時点で `if: false` を外す。
  # 詳細: ADR 0007 / issue #77
  test-e2e:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@tommykey-apps'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: web
      - name: Run E2E tests
        run: pnpm test:e2e
        working-directory: web

  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Terraform Init
        run: terraform init -reconfigure
        working-directory: infra

      - name: Terraform Validate
        run: terraform validate
        working-directory: infra

      - name: Terraform Plan
        run: terraform plan -input=false
        working-directory: infra
        env:
          TF_VAR_allowed_domain: ${{ secrets.ALLOWED_DOMAIN }}
