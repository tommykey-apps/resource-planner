name: Deploy Docs to GitHub Pages

# docs/ 全体 (architecture + ADR + use-cases + DB schema) を Jekyll で HTML 化して
# GitHub Pages に公開する。
#
# 公開 URL: https://tommykey-apps.github.io/resource-planner/
#
# 主な構成 (docs/_config.yml の baseurl: /resource-planner):
#   - /                — docs/index.md (root landing)
#   - /adr/            — docs/adr/index.md (ADR 一覧)
#   - /adr/0001-*.html — 各 ADR
#   - /use-cases.html  — docs/use-cases.md
#   - /db/             — docs/db/index.md (DB schema)
#   - /architecture.png — drawio export 画像
#
# Mermaid sequence diagram は docs/_includes/head-custom.html の script で描画。

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - uses: actions/upload-pages-artifact@v3

      - id: deployment
        uses: actions/deploy-pages@v4
