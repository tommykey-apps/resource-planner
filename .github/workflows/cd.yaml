name: CD

on:
  push:
    branches: [main]
    paths: ["web/**", "infra/**", ".github/workflows/cd.yaml"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: read

env:
  AWS_REGION: ap-northeast-1
  AWS_ROLE_ARN: arn:aws:iam::831963379503:role/resource-planner-github-actions

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'
            web:
              - 'web/**'

  deploy-infra:
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Terraform Init
        run: terraform init -reconfigure
        working-directory: infra

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        working-directory: infra
        env:
          TF_VAR_allowed_domain: ${{ secrets.ALLOWED_DOMAIN }}

  deploy-web:
    needs: [detect-changes, deploy-infra]
    if: always() && needs.detect-changes.outputs.web == 'true' && (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get SSM params
        id: params
        run: |
          ECR_URL=$(aws ssm get-parameter --name "/resource-planner/ecr-repository-url" --query "Parameter.Value" --output text)
          LAMBDA_NAME=$(aws ssm get-parameter --name "/resource-planner/lambda-function-name" --query "Parameter.Value" --output text)
          CF_ID=$(aws ssm get-parameter --name "/resource-planner/cloudfront-distribution-id" --query "Parameter.Value" --output text)
          echo "ecr_url=$ECR_URL" >> $GITHUB_OUTPUT
          echo "lambda_name=$LAMBDA_NAME" >> $GITHUB_OUTPUT
          echo "cf_id=$CF_ID" >> $GITHUB_OUTPUT

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push (ARM64, git SHA tag)
        id: build
        working-directory: web
        run: |
          IMAGE_URI="${{ steps.params.outputs.ecr_url }}:${{ github.sha }}"
          docker buildx build \
            --platform linux/arm64 \
            --provenance=false \
            --secret id=github_token,env=GITHUB_TOKEN \
            -t "$IMAGE_URI" \
            --push \
            .
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Lambda (atomic image + architecture)
        run: |
          aws lambda update-function-code \
            --function-name "${{ steps.params.outputs.lambda_name }}" \
            --image-uri "${{ steps.build.outputs.image_uri }}" \
            --architectures arm64

      - name: Wait for update
        run: aws lambda wait function-updated --function-name "${{ steps.params.outputs.lambda_name }}"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.params.outputs.cf_id }}" \
            --paths "/*"
