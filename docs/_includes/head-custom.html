<!--
  Mermaid render in Pages.

  Markdown ` ```mermaid ` ブロックは kramdown では `<pre><code class="language-mermaid">` に変換される。
  これを `<div class="mermaid">` に置換した上で mermaid.run() で描画。
  (jekyll-theme-cayman の _layouts/default.html が `{% include head-custom.html %}` を呼ぶ)
-->
<script type="module">
	import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
	mermaid.initialize({ startOnLoad: false, theme: 'default' });
	document.addEventListener('DOMContentLoaded', () => {
		const blocks = document.querySelectorAll('pre > code.language-mermaid');
		blocks.forEach((code) => {
			const div = document.createElement('div');
			div.className = 'mermaid';
			div.textContent = code.textContent;
			code.parentElement.replaceWith(div);
		});
		mermaid.run();
	});
</script>
